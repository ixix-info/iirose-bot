<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器人管理面板</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: #f0f2f5; color: #333;
        }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        header {
            background-color: #2c3e50; color: white;
            padding: 1rem 2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 1.5rem; }
        nav {
            background-color: #34495e; display: flex; gap: 0.5rem;
            padding: 0 2rem;
        }
        nav button {
            background: none; border: none; color: #ecf0f1;
            padding: 0.8rem 1.5rem; font-size: 1rem; cursor: pointer;
            transition: 0.2s; border-bottom: 3px solid transparent;
        }
        nav button:hover { background-color: #2c3e50; }
        nav button.active { border-bottom-color: #3498db; color: white; font-weight: bold; }
        main { flex: 1; padding: 2rem; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        .card {
            background: white; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .card h2 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
        .status-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }
        .status-item { background: #f8f9fa; padding: 0.8rem; border-radius: 6px; }
        .status-item strong { display: inline-block; width: 100px; }
        .color-preview {
            display: inline-block; width: 20px; height: 20px;
            border-radius: 4px; vertical-align: middle; margin-right: 8px;
            border: 1px solid #ccc;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid #ddd; }
        th { background-color: #f2f2f2; }
        .config-row {
            margin-bottom: 1rem; display: flex; flex-wrap: wrap;
            align-items: flex-start;
        }
        .config-row label { width: 150px; font-weight: bold; padding-top: 0.5rem; }
        .config-row input, .config-row select, .config-row textarea {
            flex: 1; padding: 0.5rem; border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #3498db; color: white; border: none;
            padding: 0.6rem 1.2rem; border-radius: 4px; cursor: pointer;
            font-size: 0.9rem; transition: 0.2s;
        }
        button:hover { background-color: #2980b9; }
        button.danger { background-color: #e74c3c; }
        button.danger:hover { background-color: #c0392b; }
        button.success { background-color: #27ae60; }
        button.success:hover { background-color: #219a52; }
        .mode-switch { margin-bottom: 1rem; display: flex; gap: 0.5rem; }
        .mode-switch button {
            background-color: #ecf0f1; color: #2c3e50;
        }
        .mode-switch button.active { background-color: #3498db; color: white; }
        .logs-box {
            background: #1e1e2f; color: #f8f8f2; padding: 1rem;
            border-radius: 6px; font-family: monospace; font-size: 0.85rem;
            height: 300px; overflow-y: auto; white-space: pre-wrap;
        }
        .flex-btns { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .market-tag {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            font-size: 0.8rem; font-weight: bold;
        }
        .tag-installed { background-color: #d4edda; color: #155724; }
        .tag-update { background-color: #fff3cd; color: #856404; }
        .tag-notinstalled { background-color: #f8d7da; color: #721c24; }
        @media (max-width: 700px) {
            .config-row label { width: 100%; margin-bottom: 0.3rem; }
            nav button { padding: 0.5rem 1rem; }
        }
    </style>
    <script src="echarts.min.js"></script>
</head>
<body>
<div class="app-container">
    <header>
        <h1>机器人管理面板</h1>
    </header>
    <nav>
        <button data-page="dashboard" class="active">仪表盘</button>
        <button data-page="plugins">插件管理</button>
        <button data-page="market">插件市场</button>
        <button data-page="config">配置中心</button>
        <button data-page="chart">图表</button>
    </nav>
    <main>
        <!-- 仪表盘页面 -->
        <div id="dashboard-view" class="page active">
            <div class="card">
                <h2>机器人状态</h2>
                <div class="status-grid">
                    <div class="status-item"><strong>状态:</strong> <span id="online-status">--</span></div>
                    <div class="status-item"><strong>运行时间:</strong> <span id="uptime">--</span></div>
                    <div class="status-item"><strong>当前用户:</strong> <span id="username">--</span></div>
                    <div class="status-item"><strong>当前房间:</strong> <span id="current-room">--</span></div>
                    <div class="status-item"><strong>消息颜色:</strong> <span id="color-preview" class="color-preview"></span><span id="color-value">--</span></div>
                    <div class="status-item"><strong>签名:</strong> <span id="signature">--</span></div>
                    <div class="status-item"><strong>主人:</strong> <span id="owner">--</span></div>
                    <div class="status-item"><strong>管理员:</strong> <span id="admins">--</span></div>
                </div>
            </div>
            <div class="card">
                <h2>已加载插件</h2>
                <table id="plugins-table">
                    <thead><tr><th>插件名</th><th>命令数量</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="card">
                <h2>实时日志</h2>
                <div id="logs" class="logs-box">暂无日志</div>
            </div>
        </div>

        <!-- 插件管理页面 -->
        <div id="plugins-view" class="page">
            <div class="card">
                <div class="flex-btns" style="justify-content: space-between;">
                    <h2>插件详情 & 管理</h2>
                    <button id="dep-graph-btn">显示依赖图</button>
                </div>
                <table id="plugins-detail-table">
                    <thead>
                        <tr><th>名称</th><th>描述</th><th>命令数</th><th>依赖</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div class="flex-btns">
                    <button id="restart-btn" class="danger">重启机器人</button>
                </div>
            </div>
        </div>

        <!-- 插件市场页面 -->
        <div id="market-view" class="page">
            <div class="card">
                <h2>插件市场</h2>
                <div style="margin-bottom: 1rem; display: flex; gap: 1rem;">
                    <button id="refresh-market-btn">刷新列表</button>
                    <span id="market-last-update" style="color: #666; line-height: 2.2;"></span>
                </div>
                <table id="market-table">
                    <thead>
                        <tr>
                            <th>名称</th><th>版本</th><th>描述</th><th>作者</th>
                            <th>依赖 (npm)</th><th>状态</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- 配置中心页面 -->
        <div id="config-view" class="page">
            <div class="card">
                <h2>主配置</h2>
                <div class="mode-switch">
                    <button data-mode="form" class="active">表单模式</button>
                    <button data-mode="json">JSON 模式</button>
                </div>
                <div id="main-config-form"></div>
                <textarea id="main-config-json" rows="12" style="width:100%; display:none; font-family:monospace;"></textarea>
                <div class="flex-btns">
                    <button id="save-main-config">保存主配置</button>
                </div>
            </div>
            <div class="card">
                <h2>插件配置</h2>
                <div>
                    <label>选择插件：</label>
                    <select id="plugin-select" style="width: 250px; padding: 0.4rem;"></select>
                </div>
                <div class="mode-switch" style="margin-top: 1rem;">
                    <button data-plugin-mode="form" class="active">表单模式</button>
                    <button data-plugin-mode="json">JSON 模式</button>
                </div>
                <div id="plugin-schema-table" style="background: #f9f9f9; padding: 0.5rem; border-radius: 4px; margin-bottom: 1rem;"></div>
                <div id="plugin-config-form"></div>
                <textarea id="plugin-config-json" rows="12" style="width:100%; display:none; font-family:monospace;"></textarea>
                <div class="flex-btns">
                    <button id="save-plugin-config">保存插件配置</button>
                </div>
            </div>
        </div>

        <!-- 图表页面 -->
        <div id="chart-view" class="page">
            <div class="card">
                <h2>当前房间在线人数趋势</h2>
                <div id="online-chart" style="height: 400px;"></div>
            </div>
        </div>
    </main>
</div>

<script>
    let currentPage = 'dashboard';
    let mainConfigMode = 'form';
    let pluginConfigMode = 'form';
    let ws = null;

    function httpGet(url, callback) {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try { callback(null, JSON.parse(xhr.responseText)); }
                    catch (e) { callback(e, null); }
                } else { callback(new Error('HTTP ' + xhr.status), null); }
            }
        };
        xhr.send();
    }

    function httpPost(url, data, callback) {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', url, true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    try { callback(null, JSON.parse(xhr.responseText)); }
                    catch (e) { callback(e, null); }
                } else { callback(new Error('HTTP ' + xhr.status), null); }
            }
        };
        xhr.send(JSON.stringify(data));
    }

    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(protocol + '//' + window.location.host);
        ws.onmessage = function(event) {
            const log = JSON.parse(event.data);
            const logContainer = document.getElementById('logs');
            const currentText = logContainer.innerText;
            logContainer.innerText = '[' + log.time + '] ' + log.message + '\n' + currentText;
            const lines = logContainer.innerText.split('\n');
            if (lines.length > 100) logContainer.innerText = lines.slice(0, 100).join('\n');
        };
        ws.onclose = function() { setTimeout(connectWebSocket, 3000); };
    }

    function updateDashboard() {
        httpGet('/api/status', function(err, status) {
            if (err) return;
            document.getElementById('online-status').innerText = status.online ? '在线' : '离线';
            document.getElementById('uptime').innerText = status.uptime;
            document.getElementById('username').innerText = status.username;
            document.getElementById('current-room').innerText = status.currentRoom;
            document.getElementById('color-preview').style.backgroundColor = '#' + status.color;
            document.getElementById('color-value').innerText = '#' + status.color;
            document.getElementById('signature').innerText = status.signature || '无';
            const ownerText = status.ownerName ? status.ownerName + ' (' + status.ownerUid + ')' : '未配置';
            document.getElementById('owner').innerText = ownerText;
            const admins = status.adminList.map(a => a.name || a.uid).join(', ') || '无';
            document.getElementById('admins').innerText = admins;
        });
        httpGet('/api/plugins', function(err, plugins) {
            if (err) return;
            const tbody = document.querySelector('#plugins-table tbody');
            tbody.innerHTML = '';
            plugins.forEach(p => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = p.name;
                row.insertCell(1).innerText = p.commandCount;
            });
        });
        httpGet('/api/logs?limit=30', function(err, logs) {
            if (err) return;
            const logText = logs.map(l => '[' + l.time + '] ' + l.message).join('\n');
            document.getElementById('logs').innerText = logText || '暂无日志';
        });
    }

    function loadPluginsDetail() {
        httpGet('/api/plugins/detail', function(err, plugins) {
            if (err) return;
            const tbody = document.querySelector('#plugins-detail-table tbody');
            tbody.innerHTML = '';
            plugins.forEach(p => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = p.name;
                row.insertCell(1).innerText = p.description || '无';
                row.insertCell(2).innerText = p.commandCount;
                row.insertCell(3).innerText = (p.dependencies || []).join(', ') || '无';
                const statusCell = row.insertCell(4);
                const toggleBtn = document.createElement('button');
                toggleBtn.innerText = p.enabled ? '禁用' : '启用';
                toggleBtn.style.backgroundColor = p.enabled ? '#dc3545' : '#28a745';
                toggleBtn.onclick = () => {
                    httpPost('/api/plugin/toggle', { pluginName: p.name, enabled: !p.enabled }, err => {
                        if (err) alert('操作失败: ' + err.message);
                        else { loadPluginsDetail(); loadMarketPlugins(); }
                    });
                };
                statusCell.appendChild(toggleBtn);
                const actionCell = row.insertCell(5);
                const reloadBtn = document.createElement('button');
                reloadBtn.innerText = '重载';
                reloadBtn.style.marginRight = '5px';
                reloadBtn.onclick = () => {
                    if (confirm('确定要热重载插件 ' + p.name + ' 吗？')) {
                        httpPost('/api/plugin/reload/' + p.name, {}, err => {
                            if (err) alert('重载失败: ' + err.message);
                            else alert('重载成功');
                        });
                    }
                };
                actionCell.appendChild(reloadBtn);
                const restartBtn = document.createElement('button');
                restartBtn.innerText = '重启';
                restartBtn.onclick = () => document.getElementById('restart-btn').click();
                actionCell.appendChild(restartBtn);
            });
        });
    }

    // ---------- 插件市场 ----------
    function loadMarketPlugins() {
        httpGet('/api/market/list', function(err, data) {
            if (err) { alert('获取市场列表失败: ' + err.message); return; }
            const tbody = document.querySelector('#market-table tbody');
            tbody.innerHTML = '';
            if (data.updated) {
                document.getElementById('market-last-update').innerText = '更新于: ' + new Date(data.updated).toLocaleString();
            }
            data.plugins.forEach(p => {
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = `<strong>${p.displayName || p.name}</strong><br><small>${p.name}</small>`;
                row.insertCell(1).innerText = p.version;
                row.insertCell(2).innerText = p.description || '';
                row.insertCell(3).innerText = p.author || '';
                row.insertCell(4).innerText = (p.npmDependencies || []).join(', ') || '无';
                
                const statusCell = row.insertCell(5);
                if (p.installed) {
                    let statusHtml = `<span class="market-tag tag-installed">已安装 ${p.installedVersion || ''}</span>`;
                    if (p.hasUpdate) statusHtml += `<span class="market-tag tag-update" style="margin-left:5px;">有新版本 ${p.version}</span>`;
                    statusCell.innerHTML = statusHtml;
                } else {
                    statusCell.innerHTML = '<span class="market-tag tag-notinstalled">未安装</span>';
                }
                
                const actionCell = row.insertCell(6);
                if (p.installed && !p.hasUpdate) {
                    const uninstallBtn = document.createElement('button');
                    uninstallBtn.innerText = '卸载';
                    uninstallBtn.style.backgroundColor = '#dc3545';
                    uninstallBtn.onclick = () => uninstallMarketPlugin(p.name);
                    actionCell.appendChild(uninstallBtn);
                } else {
                    const installBtn = document.createElement('button');
                    installBtn.innerText = p.installed ? '更新' : '安装';
                    installBtn.className = p.installed ? '' : 'success';
                    installBtn.onclick = () => installMarketPlugin(p.name, p.downloadUrl, p.version);
                    actionCell.appendChild(installBtn);
                    if (p.installed) {
                        const uninstallBtn = document.createElement('button');
                        uninstallBtn.innerText = '卸载';
                        uninstallBtn.style.backgroundColor = '#dc3545';
                        uninstallBtn.style.marginLeft = '5px';
                        uninstallBtn.onclick = () => uninstallMarketPlugin(p.name);
                        actionCell.appendChild(uninstallBtn);
                    }
                }
            });
        });
    }

    function installMarketPlugin(name, url, version) {
        if (!confirm(`确定要安装/更新插件 ${name} 吗？`)) return;
        httpPost('/api/market/install', { pluginName: name, downloadUrl: url, version }, function(err, result) {
            if (err) alert('操作失败: ' + err.message);
            else { alert(result.message); loadMarketPlugins(); loadPluginsDetail(); }
        });
    }

    function uninstallMarketPlugin(name) {
        if (!confirm(`确定要卸载插件 ${name} 吗？\n插件文件将被删除，且无法恢复。`)) return;
        httpPost('/api/market/uninstall', { pluginName: name }, function(err, result) {
            if (err) alert('操作失败: ' + err.message);
            else { alert(result.message); loadMarketPlugins(); loadPluginsDetail(); }
        });
    }

    // ---------- 依赖图 ----------
    function loadDependencyGraph() {
        httpGet('/api/plugins/deps-graph', function(err, data) {
            if (err) { alert('获取依赖图失败'); return; }
            const nodes = data.nodes, edges = data.edges;
            if (!nodes.length) { alert('无插件数据'); return; }
            
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center';
            const canvas = document.createElement('canvas');
            canvas.width = 900; canvas.height = 700;
            canvas.style.cssText = 'background:#1e1e2f;border-radius:8px;';
            modal.appendChild(canvas);
            const closeBtn = document.createElement('button');
            closeBtn.innerText = '关闭';
            closeBtn.style.cssText = 'position:absolute;top:20px;right:20px;padding:6px 12px;';
            closeBtn.onclick = () => modal.remove();
            modal.appendChild(closeBtn);
            document.body.appendChild(modal);
            
            const ctx = canvas.getContext('2d');
            const nodeRadius = 22;
            const positions = {};
            nodes.forEach((n, i) => {
                const angle = (i / nodes.length) * 2 * Math.PI;
                positions[n.id] = { x: 450 + 300 * Math.cos(angle), y: 350 + 250 * Math.sin(angle) };
            });
            
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // 边
                ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
                edges.forEach(e => {
                    const from = positions[e.from], to = positions[e.to];
                    if (from && to) {
                        ctx.beginPath(); ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y); ctx.stroke();
                    }
                });
                // 节点
                nodes.forEach(n => {
                    const pos = positions[n.id];
                    ctx.beginPath();
                    ctx.fillStyle = n.enabled ? '#5cb85c' : '#d9534f';
                    ctx.arc(pos.x, pos.y, nodeRadius, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = '#fff'; ctx.font = '12px sans-serif';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(n.label.length > 12 ? n.label.slice(0,10)+'…' : n.label, pos.x, pos.y);
                });
            }
            draw();
        });
    }

    // ---------- 主配置 ----------
    function buildMainConfigForm(config) {
        const fields = [
            { name: 'username', label: '用户名', type: 'text' },
            { name: 'password', label: '密码', type: 'password' },
            { name: 'defaultRoomId', label: '默认房间ID', type: 'text' },
            { name: 'roomPassword', label: '房间密码', type: 'text' },
            { name: 'color', label: '消息颜色', type: 'text' },
            { name: 'signature', label: '签名', type: 'text' },
            { name: 'logLevel', label: '日志级别', type: 'select', options: ['error','warn','info','debug'] },
            { name: 'ownerUid', label: '主人UID', type: 'text' },
            { name: 'ownerName', label: '主人名称', type: 'text' },
            { name: 'adminList', label: '管理员列表', type: 'textarea' }
        ];
        const form = document.getElementById('main-config-form');
        form.innerHTML = '';
        fields.forEach(f => {
            const div = document.createElement('div');
            div.className = 'config-row';
            div.innerHTML = `<label>${f.label}</label>`;
            let input;
            if (f.type === 'select') {
                input = document.createElement('select');
                f.options.forEach(o => { const opt = document.createElement('option'); opt.value = o; opt.innerText = o; input.appendChild(opt); });
            } else if (f.type === 'textarea') {
                input = document.createElement('textarea'); input.rows = 3;
            } else {
                input = document.createElement('input'); input.type = f.type;
            }
            input.name = f.name;
            if (f.name === 'adminList') input.value = JSON.stringify(config[f.name] || [], null, 2);
            else input.value = config[f.name] !== undefined ? config[f.name] : '';
            div.appendChild(input);
            form.appendChild(div);
        });
    }

    function loadMainConfig() {
        httpGet('/api/config/main', function(err, config) {
            if (err) return;
            buildMainConfigForm(config);
            document.getElementById('main-config-json').value = JSON.stringify(config, null, 2);
            document.getElementById('main-config-json').style.display = mainConfigMode === 'json' ? 'block' : 'none';
            document.getElementById('main-config-form').style.display = mainConfigMode === 'form' ? 'block' : 'none';
        });
    }

    function saveMainConfig() {
        let config;
        if (mainConfigMode === 'form') {
            const form = document.getElementById('main-config-form');
            const formData = {};
            form.querySelectorAll('input, select, textarea').forEach(input => {
                let value = input.value;
                if (input.name === 'adminList') { try { value = JSON.parse(value); } catch { alert('管理员列表 JSON 格式错误'); return; } }
                formData[input.name] = value;
            });
            config = formData;
        } else {
            try { config = JSON.parse(document.getElementById('main-config-json').value); }
            catch { alert('JSON 格式错误'); return; }
        }
        httpPost('/api/config/main', config, err => {
            if (err) alert('保存失败: ' + err.message);
            else alert('保存成功，请重启机器人');
        });
    }

    // ---------- 插件配置 ----------
    function loadPluginSelect() {
        httpGet('/api/plugins/detail', function(err, plugins) {
            if (err) return;
            const select = document.getElementById('plugin-select');
            select.innerHTML = '<option value="">-- 选择插件 --</option>';
            plugins.forEach(p => { const opt = document.createElement('option'); opt.value = p.name; opt.innerText = p.name; select.appendChild(opt); });
            select.onchange = function() {
                const pluginName = select.value;
                const form = document.getElementById('plugin-config-form');
                const jsonArea = document.getElementById('plugin-config-json');
                const schemaDiv = document.getElementById('plugin-schema-table');
                if (!pluginName) { form.style.display = 'none'; jsonArea.style.display = 'none'; schemaDiv.innerHTML = ''; return; }
                httpGet('/api/config/plugin/' + pluginName, function(err, config) {
                    if (err) return;
                    httpGet('/api/plugin/schema/' + pluginName, function(err, schema) {
                        if (err) return;
                        if (!schema || !Object.keys(schema).length) schemaDiv.innerHTML = '<p>该插件未提供配置说明。</p>';
                        else {
                            let html = '<table><thead><tr><th>字段</th><th>类型</th><th>说明</th></tr></thead><tbody>';
                            for (let f in schema) html += `<tr><td>${f}</td><td>${schema[f].type||'string'}</td><td>${schema[f].description||''}</td></tr>`;
                            html += '</tbody></table>';
                            schemaDiv.innerHTML = html;
                        }
                        // 表单生成
                        const formDiv = document.getElementById('plugin-config-form');
                        formDiv.innerHTML = '';
                        if (schema) {
                            for (let f in schema) {
                                const info = schema[f];
                                const div = document.createElement('div'); div.className = 'config-row';
                                div.innerHTML = `<label>${f}</label>`;
                                let input;
                                if (info.type === 'boolean') {
                                    input = document.createElement('input'); input.type = 'checkbox';
                                    input.checked = config[f] || false;
                                } else {
                                    input = document.createElement('input'); input.type = 'text';
                                    input.value = config[f] !== undefined ? config[f] : '';
                                }
                                input.name = f;
                                div.appendChild(input);
                                formDiv.appendChild(div);
                            }
                        }
                        jsonArea.value = JSON.stringify(config, null, 2);
                        if (pluginConfigMode === 'form') { formDiv.style.display = 'block'; jsonArea.style.display = 'none'; }
                        else { formDiv.style.display = 'none'; jsonArea.style.display = 'block'; }
                    });
                });
            };
        });
    }

    function savePluginConfig() {
        const pluginName = document.getElementById('plugin-select').value;
        if (!pluginName) { alert('请选择插件'); return; }
        let config;
        if (pluginConfigMode === 'form') {
            const form = document.getElementById('plugin-config-form');
            config = {};
            form.querySelectorAll('input').forEach(i => { config[i.name] = i.type === 'checkbox' ? i.checked : i.value; });
        } else {
            try { config = JSON.parse(document.getElementById('plugin-config-json').value); }
            catch { alert('JSON 格式错误'); return; }
        }
        httpPost('/api/config/plugin/' + pluginName, config, err => {
            if (err) alert('保存失败: ' + err.message);
            else alert('保存成功');
        });
    }

    function restartBot() {
        if (confirm('确定重启机器人吗？')) {
            httpPost('/api/system/restart', {}, err => {
                if (err) alert('重启失败: ' + err.message);
                else { alert('正在重启...'); setTimeout(() => location.reload(), 2000); }
            });
        }
    }

    function loadChart() {
        httpGet('/api/stats/online', function(err, data) {
            if (err) return;
            const currentRoom = document.getElementById('current-room').innerText;
            const filtered = data.filter(d => d.roomId === currentRoom);
            const times = filtered.map(d => new Date(d.time).toLocaleTimeString());
            const counts = filtered.map(d => d.count);
            const chart = echarts.init(document.getElementById('online-chart'));
            chart.setOption({
                title: { text: `房间 ${currentRoom} 在线人数` },
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: times },
                yAxis: { type: 'value', name: '人数' },
                series: [{ type: 'line', data: counts, smooth: true, areaStyle: {} }]
            });
        });
    }

    function showPage(pageName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageName + '-view').classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.querySelector(`nav button[data-page="${pageName}"]`).classList.add('active');
        currentPage = pageName;
        if (pageName === 'plugins') loadPluginsDetail();
        if (pageName === 'market') loadMarketPlugins();
        if (pageName === 'config') { loadMainConfig(); loadPluginSelect(); }
        if (pageName === 'chart') loadChart();
        if (pageName === 'dashboard') updateDashboard();
    }

    function init() {
        document.querySelectorAll('nav button').forEach(b => b.onclick = () => showPage(b.dataset.page));
        document.getElementById('save-main-config').onclick = saveMainConfig;
        document.getElementById('save-plugin-config').onclick = savePluginConfig;
        document.getElementById('restart-btn').onclick = restartBot;
        document.getElementById('dep-graph-btn').onclick = loadDependencyGraph;
        document.getElementById('refresh-market-btn').onclick = loadMarketPlugins;
        
        document.querySelectorAll('#config-view .mode-switch button').forEach(b => b.onclick = function() {
            const card = this.closest('.card');
            if (card.querySelector('h2').innerText.includes('主配置')) {
                mainConfigMode = this.dataset.mode; loadMainConfig();
            } else {
                pluginConfigMode = this.dataset.pluginMode;
                const pluginName = document.getElementById('plugin-select').value;
                if (pluginName) {
                    document.getElementById('plugin-config-form').style.display = pluginConfigMode === 'form' ? 'block' : 'none';
                    document.getElementById('plugin-config-json').style.display = pluginConfigMode === 'json' ? 'block' : 'none';
                }
            }
            card.querySelectorAll('.mode-switch button').forEach(bt => bt.classList.remove('active'));
            this.classList.add('active');
        });
        
        connectWebSocket();
        setInterval(updateDashboard, 5000);
        updateDashboard();
        showPage('dashboard');
    }
    
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
</script>
</body>
    </html>
